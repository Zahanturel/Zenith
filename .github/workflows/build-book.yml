# Build the AADP book with mdBook and publish to GitHub Pages
# Site: https://<username>.github.io/<repo>/ — If you get 404, set repo Settings → Pages → Source = "GitHub Actions"
name: Build and publish book

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install mdBook
        run: cargo install mdbook

      - name: Install mdbook-mermaid (optional preprocessor)
        run: cargo install mdbook-mermaid

      - name: Prepare book source
        run: bash scripts/prepare_mdbook.sh

      - name: Build book
        run: mdbook build

      - name: Verify site root
        run: |
          test -f book/index.html || { echo "::error::book/index.html not found — mdBook build failed to produce site root"; exit 1; }
          touch book/.nojekyll
          echo "Site root verified: book/index.html exists"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Deployment URL
        run: |
          echo "Site deployed to ${{ steps.deployment.outputs.page_url }}"
          echo "If you see 404 when visiting the URL, set **Settings → Pages → Build and deployment → Source** to **GitHub Actions** (not 'Deploy from a branch')."
