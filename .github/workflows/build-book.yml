# Build static documentation and publish to GitHub Pages
# Site: https://<username>.github.io/<repo>/ — Set Settings → Pages → Source = "GitHub Actions"
name: Build and publish book

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Require book source
        run: |
          test -f src/SUMMARY.md || { echo "::error::src/SUMMARY.md missing."; exit 1; }
          test -f src/index.md || { echo "::error::src/index.md missing."; exit 1; }
          test -d src/chapters || { echo "::error::src/chapters/ missing."; exit 1; }
          echo "Book source OK"

      - name: Build static site
        run: python scripts/build_docs.py

      - name: Verify output
        id: ensure
        run: |
          test -d site || { echo "::error::site/ not found."; exit 1; }
          test -f site/index.html || { echo "::error::site/index.html missing."; exit 1; }
          test -f site/.nojekyll || { echo "::error::site/.nojekyll missing."; exit 1; }
          echo "out_dir=site" >> "$GITHUB_OUTPUT"
          echo "Pages: $(find site -name '*.html' 2>/dev/null | wc -l)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Deployment URL
        run: |
          echo "Site deployed to ${{ steps.deployment.outputs.page_url }}"
          echo "If you see 404, set **Settings → Pages → Build and deployment → Source** to **GitHub Actions**."
