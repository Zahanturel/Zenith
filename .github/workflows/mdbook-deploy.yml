# Build the AADP book with mdBook and publish to GitHub Pages
# Site: https://<username>.github.io/<repo>/ — If you get 404, set repo Settings → Pages → Source = "GitHub Actions"
name: Build and publish book

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install mdBook
        run: cargo install mdbook

      - name: Install mdbook-mermaid (optional preprocessor)
        run: cargo install mdbook-mermaid

      - name: Prepare book source
        run: bash scripts/prepare_mdbook.sh

      - name: Require book source
        run: |
          echo "Contents of src/ after prepare:"
          find src -type f -name "*.md" 2>/dev/null | head -50
          test -f src/SUMMARY.md || { echo "::error::src/SUMMARY.md missing."; exit 1; }
          test -f src/README.md || test -f src/index.md || { echo "::error::src/README.md or src/index.md missing."; exit 1; }
          test -d src/chapters && test -n "$(find src/chapters -maxdepth 1 -name '*.md' 2>/dev/null)" || { echo "::error::No chapters in src/chapters/."; exit 1; }
          echo "Book source OK"

      - name: Build book
        run: |
          cd "$GITHUB_WORKSPACE"
          mdbook build 2>&1
          echo "--- ls after build ---"
          ls -la
          ls -la book/ 2>/dev/null || true
          ls -la book/html/ 2>/dev/null || true

      - name: Ensure index and verify
        id: ensure
        run: |
          cd "$GITHUB_WORKSPACE"
          # With multiple backends (html + pandoc), mdBook puts HTML in book/html/
          if [[ -d book/html ]]; then
            OUT=book/html
          else
            OUT=book
          fi
          mkdir -p "$OUT"
          touch "$OUT/.nojekyll"
          if [[ ! -f "$OUT/index.html" ]]; then
            FIRST=""
            for f in "$OUT/title-page.html" "$OUT/preface.html" "$OUT/00-terminology-and-front-matter.html" "$OUT/README.html"; do
              [[ -f "$f" ]] && { FIRST="$f"; break; }
            done
            [[ -z "$FIRST" ]] && for f in "$OUT"/*.html; do
              [[ -f "$f" ]] && { FIRST="$f"; break; }
            done
            if [[ -n "$FIRST" ]]; then
              echo "Creating index.html redirect to $(basename "$FIRST")"
              printf '%s\n' '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0; url='"$(basename "$FIRST")"'"><link rel="canonical" href="'"$(basename "$FIRST")"'"></head><body>Redirecting to <a href="'"$(basename "$FIRST")"'">'"$(basename "$FIRST")"'</a>.</body></html>' > "$OUT/index.html"
            else
              echo "::error::mdBook produced no HTML in $OUT. Check build log above."
              exit 1
            fi
          fi
          test -f "$OUT/index.html" || { echo "::error::book/index.html not found — mdBook build failed to produce site root"; exit 1; }
          echo "out_dir=$OUT" >> "$GITHUB_OUTPUT"
          echo "Site root verified: $OUT/index.html exists"
          echo "Pages: $(find "$OUT" -name '*.html' 2>/dev/null | wc -l)"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.ensure.outputs.out_dir }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Deployment URL
        run: |
          echo "Site deployed to ${{ steps.deployment.outputs.page_url }}"
          echo "If you see 404 when visiting the URL, set **Settings → Pages → Build and deployment → Source** to **GitHub Actions** (not 'Deploy from a branch')."
